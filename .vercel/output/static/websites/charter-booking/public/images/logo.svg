  <circle cx="70" cy="58" r="3" fill="#0c4a6e"/>
  
  <!-- Waves -->
  <path d="M20 85 Q35 80, 50 85 Q65 90, 80 85 Q95 80, 100 85" stroke="#7dd3fc" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M25 92 Q40 87, 55 92 Q70 97, 85 92" stroke="#7dd3fc" stroke-width="2" fill="none" opacity="0.4"/>
  
  <!-- Text -->
  <text x="130" y="55" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#0c4a6e">Lucky Strike</text>
  <text x="130" y="80" font-family="Arial, sans-serif" font-size="14" fill="#64748b" letter-spacing="3">LAKE ERIE CHARTERS</text>
  <text x="130" y="98" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8">Ashtabula, Ohio • Est. 1985</text>
