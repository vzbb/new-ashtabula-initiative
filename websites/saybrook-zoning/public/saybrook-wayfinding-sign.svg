<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Saybrook Township wayfinding sign">
  <defs>
    <linearGradient id="board" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c354d" />
      <stop offset="100%" stop-color="#29495e" />
    </linearGradient>
    <linearGradient id="boardEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#edf2ec" stop-opacity="0.92" />
      <stop offset="100%" stop-color="#a3b2aa" stop-opacity="0.65" />
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dfe7dd" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#c1cebf" stop-opacity="0.55" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#0f1c22" flood-opacity="0.22" />
    </filter>
  </defs>

  <rect width="1200" height="720" fill="none" />
  <g filter="url(#softShadow)">
    <path d="M210 565 C 318 520, 430 496, 588 488 C 746 480, 892 500, 1010 540" fill="none" stroke="#92a293" stroke-opacity="0.16" stroke-width="120" stroke-linecap="round" />
    <path d="M260 592 C 392 545, 514 528, 664 530 C 792 532, 916 558, 984 594" fill="none" stroke="#64776f" stroke-opacity="0.18" stroke-width="96" stroke-linecap="round" />
    <rect x="248" y="140" width="704" height="236" rx="28" fill="url(#board)" />
    <rect x="266" y="158" width="668" height="200" rx="22" fill="none" stroke="url(#boardEdge)" stroke-width="4" />
    <rect x="300" y="376" width="22" height="228" rx="11" fill="#5b6661" />
    <rect x="864" y="376" width="22" height="228" rx="11" fill="#5b6661" />
    <rect x="320" y="588" width="566" height="22" rx="11" fill="#4d5a56" />
  </g>

  <g>
    <path d="M305 202 H895" stroke="#d8e2d7" stroke-opacity="0.26" stroke-width="2" />
    <text x="600" y="238" text-anchor="middle" fill="#f2f4ef" font-size="44" font-weight="700" letter-spacing="7" font-family="Georgia, 'Times New Roman', serif">SAYBROOK</text>
    <text x="600" y="275" text-anchor="middle" fill="#d4e1da" font-size="18" font-weight="700" letter-spacing="5" font-family="Arial, Helvetica, sans-serif">TOWNSHIP</text>
    <text x="600" y="320" text-anchor="middle" fill="#f1eddc" font-size="22" font-weight="700" letter-spacing="3" font-family="Arial, Helvetica, sans-serif">ZONING CLERK</text>
  </g>

  <g opacity="0.34">
    <path d="M340 448 C 430 420, 520 412, 600 418 C 690 424, 770 444, 850 476" fill="none" stroke="url(#field)" stroke-width="4" stroke-linecap="round" />
    <path d="M334 500 C 420 472, 506 462, 602 468 C 705 476, 790 496, 874 530" fill="none" stroke="#92a293" stroke-width="2.5" stroke-linecap="round" />
  </g>

  <g opacity="0.18">
    <path d="M410 130 C 450 78, 510 58, 572 70" fill="none" stroke="#ffffff" stroke-width="3" />
    <path d="M692 126 C 742 78, 806 56, 876 70" fill="none" stroke="#ffffff" stroke-width="3" />
  </g>
</svg>
